appId: com.neopen.activebreakclock
productName: 别坐了
copyright: Copyright © 2026 neopen

# ✅ 仅保留中文语言包（合法数组语法）
electronLanguages:
  - zh-CN

directories:
  output: release

# ✅ 严格白名单（合法列表语法）
files:
  - dist/**/*
  - '!dist/**/*.map'
  - '!**/*.log'
  - '!**/*.md'
  - '!**/*.ts'

win:
  target: nsis
  icon: src/renderer/icons/icon-256.png
  asar: true
  # ✅ 压缩 app.asar（唯一合法的压缩配置）
  compression: maximum
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 别坐了
  runAfterFinish: true
  deleteAppDataOnUninstall: true
  artifactName: HealthClock-${version}-x64-Setup.${ext}