<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>健康闹铃 - 拒绝久坐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .status-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 24px 12px;
            color: white;
        }

        .status-bar h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .status-bar p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 24px;
        }

        .card {
            background: #f8fafc;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .card-title {
            font-weight: 600;
            font-size: 18px;
            color: #1e293b;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .time-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .time-input {
            flex: 1;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            padding: 12px 16px;
            font-size: 16px;
            font-family: monospace;
            font-weight: 500;
        }

        .time-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .frequency-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .frequency-input {
            flex: 1;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            padding: 12px 16px;
            font-size: 16px;
        }

        .lock-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: 0.3s;
            border-radius: 28px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #667eea;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .status-badge {
            background: #e2e8f0;
            border-radius: 40px;
            padding: 8px 16px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .status-active {
            background: #dcfce7;
            color: #166534;
        }

        .status-inactive {
            background: #fee2e2;
            color: #991b1b;
        }

        .next-reminder {
            background: #ede9fe;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            color: #5b21b6;
            margin-top: 16px;
        }

        .hidden {
            display: none !important;
        }

        /* ========== 锁屏弹框 ========== */
        .lock-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .lock-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 48px 32px;
            margin: 20px;
            width: calc(100% - 40px);
            max-width: 380px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .lock-icon {
            font-size: 72px;
            margin-bottom: 16px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .lock-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .lock-message {
            font-size: 18px;
            margin-bottom: 32px;
            opacity: 0.9;
            line-height: 1.5;
        }

        .timer-ring {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 32px;
        }

        .timer-circle-bg {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            position: absolute;
            top: 0;
            left: 0;
        }

        .timer-circle-progress {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
        }

        .timer-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }

        .timer-number {
            font-size: 52px;
            font-weight: 800;
            font-family: monospace;
            background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .timer-unit {
            font-size: 16px;
            margin-left: 4px;
            opacity: 0.7;
        }

        .timer-label {
            font-size: 12px;
            opacity: 0.5;
            margin-top: 4px;
        }

        .action-btn {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        .action-btn.disabled {
            background: linear-gradient(135deg, #475569 0%, #334155 100%);
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
        }

        .action-btn.disabled:active {
            transform: none;
        }

        .reminder-suggestion {
            margin-top: 24px;
            font-size: 14px;
            opacity: 0.6;
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .suggestion-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .suggestion-icon {
            font-size: 24px;
        }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div class="status-bar">
        <h1>⏰ 健康闹铃</h1>
        <p>拒绝久坐 · 强制活动</p>
    </div>

    <div class="content">
        <div class="status-badge" id="statusBadge">
            ⚪ 闹铃未启动
        </div>

        <div class="card">
            <div class="card-title">
                🕐 时间段设置
            </div>
            <div class="time-row">
                <input type="time" id="startTime" class="time-input" value="08:00">
                <span>—</span>
                <input type="time" id="endTime" class="time-input" value="18:00">
            </div>

            <div class="card-title" style="margin-top: 16px;">
                🔁 提醒频率
            </div>
            <div class="frequency-row">
                <span>每隔</span>
                <input type="number" id="intervalHours" class="frequency-input" value="1" min="0.5" step="0.5" style="max-width: 80px;">
                <span>小时</span>
            </div>

            <div class="card-title" style="margin-top: 16px;">
                🔒 锁屏设置
            </div>
            <div class="lock-row">
                <span>锁屏时长</span>
                <input type="number" id="lockMinutes" value="2" min="1" max="10" step="1" style="flex:1; padding: 12px; border-radius: 16px; border: 1px solid #cbd5e1;">
                <span>分钟</span>
            </div>
            <div class="lock-row">
                <span>启用强制锁屏</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="forceLockToggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div style="font-size: 12px; color: #64748b; margin-top: 12px;">
                ⚠️ 开启后，弹框期间无法关闭，必须等待倒计时结束
            </div>
        </div>

        <button class="btn btn-primary" id="startBtn">▶ 启动健康闹铃</button>
        <button class="btn btn-danger" id="stopBtn" style="margin-top: 12px;">⏹️ 停止闹铃</button>

        <div id="nextReminder" class="next-reminder hidden">
            ⏰ 下次提醒时间: <span id="nextTimeText">--:--:--</span>
        </div>
    </div>
</div>

<!-- 锁屏弹框 -->
<div id="lockOverlay" class="lock-overlay hidden">
    <div class="lock-card">
        <div class="lock-icon">🧘</div>
        <div class="lock-title">该活动啦！</div>
        <div class="lock-message">站起来走走，伸个懒腰<br>活动一下筋骨</div>
        
        <div class="timer-ring" id="timerRing">
            <div class="timer-circle-bg"></div>
            <div class="timer-center">
                <span class="timer-number" id="countdownSeconds">0</span>
                <span class="timer-unit">秒</span>
                <div class="timer-label">倒计时</div>
            </div>
        </div>
        
        <button id="unlockBtn" class="action-btn disabled">等待倒计时...</button>
        
        <div class="reminder-suggestion">
            <div class="suggestion-item">
                <span class="suggestion-icon">🚶</span>
                <span>走动一下</span>
            </div>
            <div class="suggestion-item">
                <span class="suggestion-icon">💧</span>
                <span>喝杯水</span>
            </div>
            <div class="suggestion-item">
                <span class="suggestion-icon">👀</span>
                <span>看远方</span>
            </div>
        </div>
    </div>
</div>

<script>
    // DOM 元素
    const startTimeInput = document.getElementById('startTime');
    const endTimeInput = document.getElementById('endTime');
    const intervalHoursInput = document.getElementById('intervalHours');
    const lockMinutesInput = document.getElementById('lockMinutes');
    const forceLockToggle = document.getElementById('forceLockToggle');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusBadge = document.getElementById('statusBadge');
    const nextReminderDiv = document.getElementById('nextReminder');
    const nextTimeText = document.getElementById('nextTimeText');
    const lockOverlay = document.getElementById('lockOverlay');
    const countdownSpan = document.getElementById('countdownSeconds');
    const unlockBtn = document.getElementById('unlockBtn');
    const timerRing = document.getElementById('timerRing');

    // 全局状态
    let isRunning = false;          // 闹铃是否运行中
    let checkInterval = null;       // 主检查定时器
    let nextReminderTimestamp = null; // 下次提醒时间戳
    let currentLockEndTime = null;   // 锁屏结束时间戳
    let lockTimerInterval = null;     // 锁屏倒计时定时器
    let isLocked = false;             // 是否正在锁屏中
    let progressCircle = null;        // 进度圆环元素

    // 保存配置到 localStorage
    function saveConfig() {
        const config = {
            startTime: startTimeInput.value,
            endTime: endTimeInput.value,
            intervalHours: parseFloat(intervalHoursInput.value),
            lockMinutes: parseInt(lockMinutesInput.value),
            forceLock: forceLockToggle.checked
        };
        localStorage.setItem('healthAlarmConfig', JSON.stringify(config));
    }

    // 加载配置
    function loadConfig() {
        const saved = localStorage.getItem('healthAlarmConfig');
        if (saved) {
            try {
                const config = JSON.parse(saved);
                startTimeInput.value = config.startTime || '08:00';
                endTimeInput.value = config.endTime || '18:00';
                intervalHoursInput.value = config.intervalHours || 1;
                lockMinutesInput.value = config.lockMinutes || 2;
                forceLockToggle.checked = config.forceLock || false;
            } catch(e) {}
        }
    }

    // 获取今天的某个时间点
    function getTodayTime(timeStr) {
        const [hours, minutes] = timeStr.split(':').map(Number);
        const now = new Date();
        const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, 0);
        return target;
    }

    // 判断当前时间是否在时段内
    function isWithinPeriod(now) {
        const start = getTodayTime(startTimeInput.value);
        const end = getTodayTime(endTimeInput.value);
        let endAdjusted = new Date(end);
        if (endAdjusted <= start) {
            endAdjusted.setDate(endAdjusted.getDate() + 1);
        }
        return now >= start && now <= endAdjusted;
    }

    // 计算下一次提醒时间
    function calculateNextReminder(now) {
        const start = getTodayTime(startTimeInput.value);
        const end = getTodayTime(endTimeInput.value);
        let endAdjusted = new Date(end);
        if (endAdjusted <= start) {
            endAdjusted.setDate(endAdjusted.getDate() + 1);
        }

        const intervalMs = parseFloat(intervalHoursInput.value) * 60 * 60 * 1000;

        if (!isWithinPeriod(now)) {
            let nextStart = new Date(start);
            if (now > endAdjusted) {
                nextStart.setDate(nextStart.getDate() + 1);
            }
            return nextStart;
        }

        let candidate = new Date(now.getTime() + intervalMs);
        
        if (candidate > endAdjusted) {
            let nextStart = new Date(start);
            nextStart.setDate(nextStart.getDate() + 1);
            return nextStart;
        }
        return candidate;
    }

    // 更新下次提醒显示
    function updateNextReminderDisplay() {
        if (!isRunning || !nextReminderTimestamp) {
            nextReminderDiv.classList.add('hidden');
            return;
        }
        const date = new Date(nextReminderTimestamp);
        const timeStr = `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}:${date.getSeconds().toString().padStart(2,'0')}`;
        nextTimeText.innerText = timeStr;
        nextReminderDiv.classList.remove('hidden');
    }

    // 创建/更新进度圆环
    function updateProgressCircle(remainingSeconds, totalSeconds) {
        if (!progressCircle) {
            // 创建进度圆环
            progressCircle = document.createElement('div');
            progressCircle.className = 'timer-circle-progress';
            timerRing.insertBefore(progressCircle, timerRing.querySelector('.timer-center'));
        }
        const percent = (totalSeconds - remainingSeconds) / totalSeconds;
        const angle = percent * 360;
        progressCircle.style.background = `conic-gradient(from 0deg, #a78bfa 0deg, #a78bfa ${angle}deg, rgba(255, 255, 255, 0.1) ${angle}deg)`;
    }

    // 关闭锁屏
    function closeLockScreen() {
        if (lockTimerInterval) {
            clearInterval(lockTimerInterval);
            lockTimerInterval = null;
        }
        lockOverlay.classList.add('hidden');
        isLocked = false;
        currentLockEndTime = null;
        
        // 关闭后重新调度下一次提醒
        if (isRunning) {
            const now = new Date();
            const next = calculateNextReminder(now);
            nextReminderTimestamp = next.getTime();
            updateNextReminderDisplay();
        }
    }

    // 显示锁屏弹框
    function showLockScreen(minutes, forceLock) {
        // 防止重复弹框
        if (isLocked) return;
        
        isLocked = true;
        const totalSeconds = minutes * 60;
        const endTime = Date.now() + (totalSeconds * 1000);
        currentLockEndTime = endTime;
        
        // 重置进度圆环
        if (progressCircle) {
            progressCircle.style.background = 'conic-gradient(from 0deg, #a78bfa 0deg, #a78bfa 0deg, rgba(255, 255, 255, 0.1) 0deg)';
        }
        
        lockOverlay.classList.remove('hidden');
        
        if (lockTimerInterval) clearInterval(lockTimerInterval);
        
        function updateTimer() {
            const now = Date.now();
            const remaining = Math.max(0, Math.ceil((currentLockEndTime - now) / 1000));
            countdownSpan.innerText = remaining;
            
            // 更新进度圆环
            updateProgressCircle(remaining, totalSeconds);
            
            if (remaining <= 0) {
                // 倒计时结束
                clearInterval(lockTimerInterval);
                lockTimerInterval = null;
                unlockBtn.innerText = '✅ 开始活动';
                unlockBtn.classList.remove('disabled');
                unlockBtn.disabled = false;
            } else {
                unlockBtn.innerText = `⏳ 请活动 ${remaining} 秒`;
                if (forceLock) {
                    unlockBtn.classList.add('disabled');
                    unlockBtn.disabled = true;
                } else {
                    unlockBtn.classList.remove('disabled');
                    unlockBtn.disabled = false;
                }
            }
        }
        
        updateTimer();
        lockTimerInterval = setInterval(updateTimer, 100);
    }

    // 触发提醒
    function triggerReminder() {
        if (!isRunning || isLocked) return;
        
        const lockMinutes = parseInt(lockMinutesInput.value) || 2;
        const forceLock = forceLockToggle.checked;
        
        showLockScreen(lockMinutes, forceLock);
    }

    // 解锁按钮点击处理
    function onUnlock() {
        if (!isLocked) return;
        
        const now = Date.now();
        const forceLock = forceLockToggle.checked;
        
        if (currentLockEndTime && now >= currentLockEndTime) {
            // 时间到了，正常解锁
            closeLockScreen();
        } else if (!forceLock) {
            // 非强制模式，允许提前结束
            if (confirm('活动时间还没到，确定要提前结束吗？记得起来活动一下哦！')) {
                closeLockScreen();
            }
        }
        // 强制模式下时间未到，按钮是禁用的，不会执行到这里
    }

    // 主检查循环
    function checkAndRemind() {
        if (!isRunning) return;
        if (isLocked) return;
        
        const now = Date.now();
        if (nextReminderTimestamp && now >= nextReminderTimestamp) {
            triggerReminder();
        }
    }

    // 重新调度主循环
    function rescheduleMainLoop() {
        if (checkInterval) clearInterval(checkInterval);
        if (!isRunning) return;
        checkInterval = setInterval(checkAndRemind, 500);
    }

    // 启动闹铃
    function startAlarm() {
        if (isRunning) return;
        
        saveConfig();
        
        const now = new Date();
        const next = calculateNextReminder(now);
        nextReminderTimestamp = next.getTime();
        
        isRunning = true;
        updateNextReminderDisplay();
        rescheduleMainLoop();
        updateUI();
    }

    // 停止闹铃
    function stopAlarm() {
        isRunning = false;
        
        if (checkInterval) {
            clearInterval(checkInterval);
            checkInterval = null;
        }
        
        if (isLocked) {
            closeLockScreen();
        }
        
        nextReminderTimestamp = null;
        updateUI();
        nextReminderDiv.classList.add('hidden');
    }

    // 更新UI状态
    function updateUI() {
        if (isRunning) {
            statusBadge.innerHTML = '🟢 闹铃运行中 · 将在时间段内自动提醒';
            statusBadge.className = 'status-badge status-active';
            startBtn.disabled = true;
            startBtn.style.opacity = '0.6';
            stopBtn.style.background = '#ef4444';
        } else {
            statusBadge.innerHTML = '⚪ 闹铃未启动';
            statusBadge.className = 'status-badge status-inactive';
            startBtn.disabled = false;
            startBtn.style.opacity = '1';
            stopBtn.style.background = '#ef4444';
        }
    }

    // 初始化进度圆环（不显示，只是创建）
    function initProgressCircle() {
        if (timerRing && !progressCircle) {
            progressCircle = document.createElement('div');
            progressCircle.className = 'timer-circle-progress';
            timerRing.insertBefore(progressCircle, timerRing.querySelector('.timer-center'));
            progressCircle.style.background = 'conic-gradient(from 0deg, #a78bfa 0deg, #a78bfa 0deg, rgba(255, 255, 255, 0.1) 0deg)';
        }
    }

    // 事件绑定
    startTimeInput.addEventListener('change', saveConfig);
    endTimeInput.addEventListener('change', saveConfig);
    intervalHoursInput.addEventListener('change', saveConfig);
    lockMinutesInput.addEventListener('change', saveConfig);
    forceLockToggle.addEventListener('change', saveConfig);
    
    startBtn.addEventListener('click', startAlarm);
    stopBtn.addEventListener('click', stopAlarm);
    unlockBtn.addEventListener('click', onUnlock);

    // 初始化
    loadConfig();
    updateUI();
    initProgressCircle();
    
    // 确保弹框初始是隐藏的
    lockOverlay.classList.add('hidden');
    isLocked = false;
    isRunning = false;

    // 页面关闭提醒
    window.addEventListener('beforeunload', (e) => {
        if (isRunning) {
            e.preventDefault();
            e.returnValue = '闹铃正在运行，确定要离开吗？';
        }
    });
</script>
</body>
</html>
