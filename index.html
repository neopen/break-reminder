<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>健康闹铃 - 拒绝久坐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .status-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 24px 12px;
            color: white;
        }

        .status-bar h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .status-bar p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 24px;
        }

        .card {
            background: #f8fafc;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .card-title {
            font-weight: 600;
            font-size: 18px;
            color: #1e293b;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .time-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .time-input {
            flex: 1;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            padding: 12px 16px;
            font-size: 16px;
            font-family: monospace;
            font-weight: 500;
        }

        .time-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .frequency-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .frequency-input {
            flex: 1;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            padding: 12px 16px;
            font-size: 16px;
        }

        .input-error {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
        }

        .error-hint {
            font-size: 12px;
            color: #ef4444;
            margin-top: 4px;
            margin-left: 12px;
        }

        .lock-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .lock-input {
            flex: 1;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            padding: 12px 16px;
            font-size: 16px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: 0.3s;
            border-radius: 28px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #667eea;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .status-badge {
            background: #e2e8f0;
            border-radius: 40px;
            padding: 8px 16px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .status-active {
            background: #dcfce7;
            color: #166534;
        }

        .status-inactive {
            background: #fee2e2;
            color: #991b1b;
        }

        .next-reminder {
            background: #ede9fe;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            color: #5b21b6;
            margin-top: 16px;
        }

        .hidden {
            display: none !important;
        }

        /* ========== 锁屏弹框 ========== */
        .lock-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .lock-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 48px 32px;
            margin: 20px;
            width: calc(100% - 40px);
            max-width: 380px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .lock-icon {
            font-size: 72px;
            margin-bottom: 16px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .lock-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .lock-message {
            font-size: 18px;
            margin-bottom: 32px;
            opacity: 0.9;
            line-height: 1.5;
        }

        .timer-ring {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 32px;
        }

        .timer-circle-bg {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            position: absolute;
            top: 0;
            left: 0;
        }

        .timer-circle-progress {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
        }

        .timer-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }

        .timer-number {
            font-size: 52px;
            font-weight: 800;
            font-family: monospace;
            background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .timer-unit {
            font-size: 16px;
            margin-left: 4px;
            opacity: 0.7;
        }

        .timer-label {
            font-size: 12px;
            opacity: 0.5;
            margin-top: 4px;
        }

        .action-btn {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        .action-btn.disabled {
            background: linear-gradient(135deg, #475569 0%, #334155 100%);
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
        }

        .action-btn.disabled:active {
            transform: none;
        }

        .reminder-suggestion {
            margin-top: 24px;
            font-size: 14px;
            opacity: 0.6;
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .suggestion-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .suggestion-icon {
            font-size: 24px;
        }

        /* ========== 美化的自定义确认弹框 ========== */
        .custom-dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 20000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        .custom-dialog {
            background: white;
            border-radius: 32px;
            width: 320px;
            max-width: 85%;
            overflow: hidden;
            animation: slideUp 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dialog-icon {
            text-align: center;
            padding: 32px 32px 16px 32px;
            font-size: 56px;
        }

        .dialog-title {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
            padding: 0 24px 12px 24px;
        }

        .dialog-message {
            text-align: center;
            font-size: 16px;
            color: #64748b;
            padding: 0 24px 24px 24px;
            line-height: 1.5;
        }

        .dialog-buttons {
            display: flex;
            border-top: 1px solid #e2e8f0;
        }

        .dialog-btn {
            flex: 1;
            text-align: center;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: white;
        }

        .dialog-btn:active {
            background: #f1f5f9;
        }

        .dialog-btn-cancel {
            color: #64748b;
            border-right: 1px solid #e2e8f0;
        }

        .dialog-btn-confirm {
            color: #ef4444;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div class="status-bar">
        <h1>⏰ 健康闹铃</h1>
        <p>拒绝久坐 · 强制活动</p>
    </div>

    <div class="content">
        <div class="status-badge" id="statusBadge">
            ⚪ 闹铃未启动
        </div>

        <div class="card">
            <div class="card-title">
                🕐 时间段设置
            </div>
            <div class="time-row">
                <input type="time" id="startTime" class="time-input" value="08:00">
                <span>—</span>
                <input type="time" id="endTime" class="time-input" value="18:00">
            </div>

            <div class="card-title" style="margin-top: 16px;">
                🔁 提醒频率
            </div>
            <div class="frequency-row">
                <span>每隔</span>
                <input type="number" id="intervalHours" class="frequency-input" value="1" min="0.5" max="6" step="0.5" style="max-width: 80px;">
                <span>小时</span>
            </div>
            <div id="intervalError" class="error-hint hidden"></div>

            <div class="card-title" style="margin-top: 16px;">
                🔒 锁屏设置
            </div>
            <div class="lock-row">
                <span>锁屏时长</span>
                <input type="number" id="lockMinutes" class="lock-input" value="2" min="1" max="30" step="1">
                <span>分钟</span>
            </div>
            <div id="lockError" class="error-hint hidden"></div>
            
            <div class="lock-row">
                <span>启用强制锁屏</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="forceLockToggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div style="font-size: 12px; color: #64748b; margin-top: 12px;">
                ⚠️ 开启后，弹框期间无法关闭，必须等待倒计时结束
            </div>
        </div>

        <button class="btn btn-primary" id="startBtn">▶ 启动健康闹铃</button>
        <button class="btn btn-danger" id="stopBtn" style="margin-top: 12px;">⏹️ 停止闹铃</button>

        <div id="nextReminder" class="next-reminder hidden">
            ⏰ 下次提醒时间: <span id="nextTimeText">--:--:--</span>
        </div>
    </div>
</div>

<!-- 锁屏弹框 -->
<div id="lockOverlay" class="lock-overlay hidden">
    <div class="lock-card">
        <div class="lock-icon">🧘</div>
        <div class="lock-title">该活动啦！</div>
        <div class="lock-message">站起来走走，伸个懒腰<br>活动一下筋骨</div>
        
        <div class="timer-ring" id="timerRing">
            <div class="timer-circle-bg"></div>
            <div class="timer-center">
                <span class="timer-number" id="countdownSeconds">0</span>
                <span class="timer-unit">秒</span>
                <div class="timer-label">倒计时</div>
            </div>
        </div>
        
        <button id="unlockBtn" class="action-btn disabled">等待倒计时...</button>
        
        <div class="reminder-suggestion">
            <div class="suggestion-item">
                <span class="suggestion-icon">🚶</span>
                <span>走动一下</span>
            </div>
            <div class="suggestion-item">
                <span class="suggestion-icon">💧</span>
                <span>喝杯水</span>
            </div>
            <div class="suggestion-item">
                <span class="suggestion-icon">👀</span>
                <span>看远方</span>
            </div>
        </div>
    </div>
</div>

<script>
    // DOM 元素
    const startTimeInput = document.getElementById('startTime');
    const endTimeInput = document.getElementById('endTime');
    const intervalHoursInput = document.getElementById('intervalHours');
    const lockMinutesInput = document.getElementById('lockMinutes');
    const forceLockToggle = document.getElementById('forceLockToggle');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusBadge = document.getElementById('statusBadge');
    const nextReminderDiv = document.getElementById('nextReminder');
    const nextTimeText = document.getElementById('nextTimeText');
    const lockOverlay = document.getElementById('lockOverlay');
    const countdownSpan = document.getElementById('countdownSeconds');
    const unlockBtn = document.getElementById('unlockBtn');
    const timerRing = document.getElementById('timerRing');
    const intervalError = document.getElementById('intervalError');
    const lockError = document.getElementById('lockError');

    // 校验配置
    function validateInterval(value) {
        const num = parseFloat(value);
        if (isNaN(num)) return false;
        return num >= 0.5 && num <= 6;
    }

    function validateLockMinutes(value) {
        const num = parseInt(value);
        if (isNaN(num)) return false;
        return num >= 1 && num <= 30;
    }

    function validateAndShowErrors() {
        let isValid = true;
        
        if (!validateInterval(intervalHoursInput.value)) {
            intervalError.textContent = '提醒频率范围：0.5 ~ 6 小时';
            intervalError.classList.remove('hidden');
            intervalHoursInput.classList.add('input-error');
            isValid = false;
        } else {
            intervalError.classList.add('hidden');
            intervalHoursInput.classList.remove('input-error');
        }
        
        if (!validateLockMinutes(lockMinutesInput.value)) {
            lockError.textContent = '锁屏时长范围：1 ~ 30 分钟';
            lockError.classList.remove('hidden');
            lockMinutesInput.classList.add('input-error');
            isValid = false;
        } else {
            lockError.classList.add('hidden');
            lockMinutesInput.classList.remove('input-error');
        }
        
        return isValid;
    }

    function fixIntervalValue() {
        let value = parseFloat(intervalHoursInput.value);
        if (isNaN(value)) {
            intervalHoursInput.value = 1;
        } else if (value < 0.5) {
            intervalHoursInput.value = 0.5;
        } else if (value > 6) {
            intervalHoursInput.value = 6;
        } else {
            const rounded = Math.round(value * 2) / 2;
            intervalHoursInput.value = rounded;
        }
        validateAndShowErrors();
    }

    function fixLockValue() {
        let value = parseInt(lockMinutesInput.value);
        if (isNaN(value)) {
            lockMinutesInput.value = 2;
        } else if (value < 1) {
            lockMinutesInput.value = 1;
        } else if (value > 30) {
            lockMinutesInput.value = 30;
        }
        validateAndShowErrors();
    }

    // 全局状态
    let isRunning = false;
    let checkInterval = null;
    let nextReminderTimestamp = null;
    let currentLockEndTime = null;
    let lockTimerInterval = null;
    let isLocked = false;
    let progressCircle = null;

    // 自定义确认弹框
    function showConfirmDialog(options) {
        return new Promise((resolve) => {
            const { title, message, confirmText = '确定', cancelText = '取消', confirmColor = '#ef4444' } = options;
            
            const overlay = document.createElement('div');
            overlay.className = 'custom-dialog-overlay';
            
            const dialog = document.createElement('div');
            dialog.className = 'custom-dialog';
            
            dialog.innerHTML = `
                <div class="dialog-icon">⚠️</div>
                <div class="dialog-title">${title}</div>
                <div class="dialog-message">${message}</div>
                <div class="dialog-buttons">
                    <button class="dialog-btn dialog-btn-cancel">${cancelText}</button>
                    <button class="dialog-btn dialog-btn-confirm" style="color: ${confirmColor}">${confirmText}</button>
                </div>
            `;
            
            overlay.appendChild(dialog);
            document.body.appendChild(overlay);
            
            const cancelBtn = dialog.querySelector('.dialog-btn-cancel');
            const confirmBtn = dialog.querySelector('.dialog-btn-confirm');
            
            const close = (result) => {
                overlay.style.animation = 'fadeOut 0.2s ease';
                setTimeout(() => {
                    overlay.remove();
                    resolve(result);
                }, 200);
            };
            
            cancelBtn.onclick = () => close(false);
            confirmBtn.onclick = () => close(true);
        });
    }

    // 保存配置
    function saveConfig() {
        if (!validateAndShowErrors()) return false;
        
        const config = {
            startTime: startTimeInput.value,
            endTime: endTimeInput.value,
            intervalHours: parseFloat(intervalHoursInput.value),
            lockMinutes: parseInt(lockMinutesInput.value),
            forceLock: forceLockToggle.checked
        };
        localStorage.setItem('healthAlarmConfig', JSON.stringify(config));
        return true;
    }

    function loadConfig() {
        const saved = localStorage.getItem('healthAlarmConfig');
        if (saved) {
            try {
                const config = JSON.parse(saved);
                startTimeInput.value = config.startTime || '08:00';
                endTimeInput.value = config.endTime || '18:00';
                intervalHoursInput.value = config.intervalHours || 1;
                lockMinutesInput.value = config.lockMinutes || 2;
                forceLockToggle.checked = config.forceLock || false;
            } catch(e) {}
        }
        fixIntervalValue();
        fixLockValue();
    }

    function getTodayTime(timeStr) {
        const [hours, minutes] = timeStr.split(':').map(Number);
        const now = new Date();
        const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, 0);
        return target;
    }

    function isWithinPeriod(now) {
        const start = getTodayTime(startTimeInput.value);
        const end = getTodayTime(endTimeInput.value);
        let endAdjusted = new Date(end);
        if (endAdjusted <= start) {
            endAdjusted.setDate(endAdjusted.getDate() + 1);
        }
        return now >= start && now <= endAdjusted;
    }

    // 核心修正：不在时间段内时，下次提醒 = 开始时间 + 频率间隔
    function calculateNextReminder(now) {
        const start = getTodayTime(startTimeInput.value);
        const end = getTodayTime(endTimeInput.value);
        let endAdjusted = new Date(end);
        if (endAdjusted <= start) {
            endAdjusted.setDate(endAdjusted.getDate() + 1);
        }

        const intervalMs = parseFloat(intervalHoursInput.value) * 60 * 60 * 1000;

        // 情况1：当前在时间段内
        if (isWithinPeriod(now)) {
            let candidate = new Date(now.getTime() + intervalMs);
            if (candidate > endAdjusted) {
                // 超出今天结束时间，推到明天的开始时间 + 间隔
                let nextStart = new Date(start);
                nextStart.setDate(nextStart.getDate() + 1);
                return new Date(nextStart.getTime() + intervalMs);
            }
            return candidate;
        }
        
        // 情况2：当前不在时间段内
        // 判断是早于开始时间还是晚于结束时间
        if (now < start) {
            // 今天开始时间 + 间隔
            return new Date(start.getTime() + intervalMs);
        } else {
            // 晚于结束时间：明天的开始时间 + 间隔
            let tomorrowStart = new Date(start);
            tomorrowStart.setDate(tomorrowStart.getDate() + 1);
            return new Date(tomorrowStart.getTime() + intervalMs);
        }
    }

    function updateNextReminderDisplay() {
        if (!isRunning || !nextReminderTimestamp) {
            nextReminderDiv.classList.add('hidden');
            return;
        }
        const date = new Date(nextReminderTimestamp);
        const timeStr = `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}:${date.getSeconds().toString().padStart(2,'0')}`;
        nextTimeText.innerText = timeStr;
        nextReminderDiv.classList.remove('hidden');
    }

    function updateProgressCircle(remainingSeconds, totalSeconds) {
        if (!progressCircle) {
            progressCircle = document.createElement('div');
            progressCircle.className = 'timer-circle-progress';
            timerRing.insertBefore(progressCircle, timerRing.querySelector('.timer-center'));
        }
        const percent = (totalSeconds - remainingSeconds) / totalSeconds;
        const angle = percent * 360;
        progressCircle.style.background = `conic-gradient(from 0deg, #a78bfa 0deg, #a78bfa ${angle}deg, rgba(255, 255, 255, 0.1) ${angle}deg)`;
    }

    function closeLockScreen() {
        if (lockTimerInterval) {
            clearInterval(lockTimerInterval);
            lockTimerInterval = null;
        }
        
        lockOverlay.style.animation = 'fadeOut 0.3s ease';
        setTimeout(() => {
            lockOverlay.classList.add('hidden');
            lockOverlay.style.animation = '';
            isLocked = false;
            currentLockEndTime = null;
            
            if (isRunning) {
                const now = new Date();
                const next = calculateNextReminder(now);
                nextReminderTimestamp = next.getTime();
                updateNextReminderDisplay();
            }
        }, 300);
    }

    function showLockScreen(minutes, forceLock) {
        if (isLocked) return;
        
        isLocked = true;
        const totalSeconds = minutes * 60;
        const endTime = Date.now() + (totalSeconds * 1000);
        currentLockEndTime = endTime;
        
        if (progressCircle) {
            progressCircle.style.background = 'conic-gradient(from 0deg, #a78bfa 0deg, #a78bfa 0deg, rgba(255, 255, 255, 0.1) 0deg)';
        }
        
        lockOverlay.classList.remove('hidden');
        lockOverlay.style.animation = 'fadeIn 0.3s ease';
        
        if (lockTimerInterval) clearInterval(lockTimerInterval);
        
        function updateTimer() {
            const now = Date.now();
            const remaining = Math.max(0, Math.ceil((currentLockEndTime - now) / 1000));
            countdownSpan.innerText = remaining;
            updateProgressCircle(remaining, totalSeconds);
            
            if (remaining <= 0) {
                clearInterval(lockTimerInterval);
                lockTimerInterval = null;
                closeLockScreen();
            } else {
                unlockBtn.innerText = `⏳ 请活动 ${remaining} 秒`;
                if (forceLock) {
                    unlockBtn.classList.add('disabled');
                    unlockBtn.disabled = true;
                } else {
                    unlockBtn.classList.remove('disabled');
                    unlockBtn.disabled = false;
                }
            }
        }
        
        updateTimer();
        lockTimerInterval = setInterval(updateTimer, 100);
    }

    function triggerReminder() {
        if (!isRunning || isLocked) return;
        
        let lockMinutes = parseInt(lockMinutesInput.value);
        if (isNaN(lockMinutes) || lockMinutes < 1) lockMinutes = 2;
        if (lockMinutes > 30) lockMinutes = 30;
        
        const forceLock = forceLockToggle.checked;
        showLockScreen(lockMinutes, forceLock);
    }

    async function onUnlock() {
        if (!isLocked) return;
        
        const now = Date.now();
        const forceLock = forceLockToggle.checked;
        
        if (currentLockEndTime && now >= currentLockEndTime) {
            if (isLocked) {
                closeLockScreen();
            }
        } else if (!forceLock) {
            const confirmed = await showConfirmDialog({
                title: '提前结束提醒',
                message: '活动时间还没到，提前结束可能会影响健康习惯。\n确定要提前结束吗？',
                confirmText: '提前结束',
                cancelText: '继续活动',
                confirmColor: '#f59e0b'
            });
            
            if (confirmed) {
                closeLockScreen();
            }
        }
    }

    function checkAndRemind() {
        if (!isRunning) return;
        if (isLocked) return;
        
        const now = Date.now();
        if (nextReminderTimestamp && now >= nextReminderTimestamp) {
            triggerReminder();
        }
    }

    function rescheduleMainLoop() {
        if (checkInterval) clearInterval(checkInterval);
        if (!isRunning) return;
        checkInterval = setInterval(checkAndRemind, 500);
    }

    async function startAlarm() {
        if (!validateAndShowErrors()) {
            await showConfirmDialog({
                title: '配置无效',
                message: '请先修正上面的错误设置后再启动闹铃。',
                confirmText: '知道了',
                cancelText: '',
                confirmColor: '#667eea'
            });
            return;
        }
        
        if (isRunning) return;
        
        if (!saveConfig()) return;
        
        const now = new Date();
        const next = calculateNextReminder(now);
        nextReminderTimestamp = next.getTime();
        
        isRunning = true;
        updateNextReminderDisplay();
        rescheduleMainLoop();
        updateUI();
    }

    function stopAlarm() {
        isRunning = false;
        
        if (checkInterval) {
            clearInterval(checkInterval);
            checkInterval = null;
        }
        
        if (isLocked) {
            closeLockScreen();
        }
        
        nextReminderTimestamp = null;
        updateUI();
        nextReminderDiv.classList.add('hidden');
    }

    function updateUI() {
        if (isRunning) {
            statusBadge.innerHTML = '🟢 闹铃运行中 · 将在时间段内自动提醒';
            statusBadge.className = 'status-badge status-active';
            startBtn.disabled = true;
            startBtn.style.opacity = '0.6';
            stopBtn.style.background = '#ef4444';
        } else {
            statusBadge.innerHTML = '⚪ 闹铃未启动';
            statusBadge.className = 'status-badge status-inactive';
            startBtn.disabled = false;
            startBtn.style.opacity = '1';
            stopBtn.style.background = '#ef4444';
        }
    }

    function initProgressCircle() {
        if (timerRing && !progressCircle) {
            progressCircle = document.createElement('div');
            progressCircle.className = 'timer-circle-progress';
            timerRing.insertBefore(progressCircle, timerRing.querySelector('.timer-center'));
            progressCircle.style.background = 'conic-gradient(from 0deg, #a78bfa 0deg, #a78bfa 0deg, rgba(255, 255, 255, 0.1) 0deg)';
        }
    }

    // 输入事件绑定
    intervalHoursInput.addEventListener('input', () => {
        fixIntervalValue();
        if (isRunning) {
            const now = new Date();
            const next = calculateNextReminder(now);
            nextReminderTimestamp = next.getTime();
            updateNextReminderDisplay();
            rescheduleMainLoop();
        }
    });
    
    lockMinutesInput.addEventListener('input', fixLockValue);
    
    startTimeInput.addEventListener('change', () => {
        saveConfig();
        if (isRunning) {
            const now = new Date();
            const next = calculateNextReminder(now);
            nextReminderTimestamp = next.getTime();
            updateNextReminderDisplay();
        }
    });
    
    endTimeInput.addEventListener('change', () => {
        saveConfig();
        if (isRunning) {
            const now = new Date();
            const next = calculateNextReminder(now);
            nextReminderTimestamp = next.getTime();
            updateNextReminderDisplay();
        }
    });
    
    forceLockToggle.addEventListener('change', saveConfig);
    
    startBtn.addEventListener('click', startAlarm);
    stopBtn.addEventListener('click', stopAlarm);
    unlockBtn.addEventListener('click', onUnlock);

    // 初始化
    loadConfig();
    updateUI();
    initProgressCircle();
    lockOverlay.classList.add('hidden');
    isLocked = false;
    isRunning = false;

    window.addEventListener('beforeunload', (e) => {
        if (isRunning) {
            e.preventDefault();
            e.returnValue = '闹铃正在运行，确定要离开吗？';
        }
    });
</script>
</body>
</html>
