<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="bellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- 背景圆角方形 -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgGrad)"/>
  
  <!-- 外圈光晕 -->
  <circle cx="256" cy="220" r="120" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8"/>
  
  <!-- 铃铛主体 -->
  <path d="M256 80 C220 80 190 105 186 140 L176 230 C172 260 160 280 140 292 L140 300 L372 300 L372 292 C352 280 340 260 336 230 L326 140 C322 105 292 80 256 80 Z" 
        fill="url(#bellGrad)" stroke="#d97706" stroke-width="4"/>
  
  <!-- 铃铛顶部圆钮 -->
  <circle cx="256" cy="72" r="18" fill="#fcd34d" stroke="#d97706" stroke-width="3"/>
  
  <!-- 铃铛底部开口 -->
  <path d="M210 300 L210 310 C210 330 230 348 256 348 C282 348 302 330 302 310 L302 300" 
        fill="none" stroke="#d97706" stroke-width="5" stroke-linecap="round"/>
  
  <!-- 铃舌 -->
  <circle cx="256" cy="355" r="10" fill="#f59e0b"/>
  
  <!-- 提醒波纹（右侧） -->
  <path d="M380 160 Q400 200 395 240" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="4" stroke-linecap="round"/>
  <path d="M400 130 Q430 190 420 260" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 提醒波纹（左侧） -->
  <path d="M132 160 Q112 200 117 240" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="4" stroke-linecap="round"/>
  <path d="M112 130 Q82 190 92 260" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 底部文字 "STAND" -->
  <text x="256" y="440" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" 
        fill="white" text-anchor="middle" letter-spacing="4" opacity="0.9">STAND</text>
</svg>